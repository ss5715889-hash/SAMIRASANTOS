<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Samira Santos</title>    
    <link rel="stylesheet" href="style12.css">
</head>
<body>
    <header>
        <h1>Meu Portifólio</h1>
        <nav>
            <ul>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#projetos">Projetos</a></li>
                <li><a href="#contato">Contato</a></li>
                <li><button id="btn-tema">Escuro</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="sobre">
            <h2>Sobre Mim</h2>
            <img src="perfil.jpg" alt="Foto de Samira Santos">
            <p>Olá sou Samira Santos, aluna do curso de Sistemas para Internet e sempre em busca de novos desafios e soluções inovadoras.</p>
        </section>

        <section id="projetos">
            <h2>Meus Projetos</h2>
            <div class="projetos-container"></div>
        </section>

        <section id="contato">
            <h2>Contato</h2>
            <form action="#" method="post" id="meu-formulario">
                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" required>                
                </div>
                <div class="campo">
                    <label for="msg">Mensagem:</label>
                    <textarea id="msg"></textarea>
                </div>
                
                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido por Samira Santos</p>
    </footer>
    
    <script src="script12.js"></script>
</body>
</html>
